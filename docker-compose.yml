services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-dc-tavern-card-showcase:latest}
    container_name: ${CONTAINER_NAME:-dc-tavern-card-showcase}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
